name: Release

on:
  push:
    branches:
      - main
    paths:
      - "packages/react-native-screen-transitions/package.json"
      - "packages/react-native-screen-transitions/CHANGELOG.md"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PACKAGE_DIR: packages/react-native-screen-transitions

jobs:
  stable-from-main:
    name: Stable Release From Main
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Checkout branch
        run: |
          git checkout -B "$GITHUB_REF_NAME" "origin/$GITHUB_REF_NAME"
          git branch --set-upstream-to="origin/$GITHUB_REF_NAME" "$GITHUB_REF_NAME"

      - name: Detect releasable version bump
        id: release
        env:
          PACKAGE_JSON_PATH: ${{ env.PACKAGE_DIR }}/package.json
        run: node .github/scripts/should-release-stable.mjs

      - name: Skip release
        if: ${{ steps.release.outputs.should_release != 'true' }}
        run: echo "${{ steps.release.outputs.reason }}"

      - name: Setup Bun
        if: ${{ steps.release.outputs.should_release == 'true' }}
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.2.20

      - name: Setup Node
        if: ${{ steps.release.outputs.should_release == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for trusted publishing
        if: ${{ steps.release.outputs.should_release == 'true' }}
        run: npm install -g npm@latest

      - name: Enable npm provenance
        if: ${{ steps.release.outputs.should_release == 'true' }}
        run: npm config set provenance true

      - name: Configure git user
        if: ${{ steps.release.outputs.should_release == 'true' }}
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - name: Install deps
        if: ${{ steps.release.outputs.should_release == 'true' }}
        run: bun install --frozen-lockfile

      - name: Publish stable release
        if: ${{ steps.release.outputs.should_release == 'true' }}
        working-directory: ${{ env.PACKAGE_DIR }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx release-it --config ../../.release-it.json --ci --no-increment --no-git.commit --git.requireBranch=main --npm.tag=latest
